<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NexAcro - AI-Based Acrosome Intactness Analysis for IVF Excellence. Clinical AI platform for doctors." />
    <title>NexAcro · AI Acrosome Analysis</title>
  </head>
  <body>
    <script>
      // Handle Vite chunk load errors (often caused by new deployments)
      window.addEventListener('error', (e) => {
        if (e.target.tagName === 'SCRIPT' || e.message.includes('Failed to fetch dynamically imported module')) {
          console.warn('Script load error detected, reloading...', e);
          const hasReloaded = sessionStorage.getItem('app-reloaded-on-error');
          if (!hasReloaded) {
            sessionStorage.setItem('app-reloaded-on-error', 'true');
            // Clear all service worker caches and reload
            if ('caches' in window) {
              caches.keys().then((names) => {
                for (let name of names) caches.delete(name);
              });
            }
            window.location.reload();
          }
        }
      }, true);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Clear reload flag after successful boot
      window.addEventListener('load', () => {
        setTimeout(() => {
          sessionStorage.removeItem('app-reloaded-on-error');
        }, 3000);
      });
    </script>
  </body>
</html>
